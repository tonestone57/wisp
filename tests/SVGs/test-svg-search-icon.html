<!DOCTYPE html>

        body {
            font-family: Arial, sans-serif;

        }

        .icon-container {
            display: inline-block;
            border: 1px dashed #ccc;
            padding: 10px;
            margin: 10px;
            background: white;
            vertical-align: top;
        }

        /* Exact CSS from hotair.com */
        .search-icon>svg {
            fill: #972123;
            width: 20px
        }

        /* Scaled up version for visibility */
        .search-icon-large>svg {
            fill: #972123;
            width: 128px;
            height: 128px;
        }
    </style>
</head>
