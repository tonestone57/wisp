<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <!-- Background rectangles for visibility -->
  <rect x="0" y="0" width="400" height="200" fill="#f0f0f0"/>
  <rect x="20" y="20" width="160" height="160" fill="#333333"/>
  <rect x="220" y="20" width="160" height="160" fill="#333333"/>

  <!-- Left: full opacity circle -->
  <circle cx="100" cy="100" r="60" fill="#FF0000" fill-opacity="1.0"
          stroke="#0000FF" stroke-width="4" stroke-opacity="1.0"/>
  <text x="100" y="195" text-anchor="middle" font-size="12" fill="black">fill-opacity: 1.0</text>

  <!-- Right: 50% opacity circle -->
  <circle cx="300" cy="100" r="60" fill="#FF0000" fill-opacity="0.5"
          stroke="#0000FF" stroke-width="4" stroke-opacity="0.5"/>
  <text x="300" y="195" text-anchor="middle" font-size="12" fill="black">fill-opacity: 0.5</text>
</svg>
