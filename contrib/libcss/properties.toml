# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                        CSS Property Definitions                            ║
# ║                                                                            ║
# ║  Single source of truth for all CSS property metadata in libcss.           ║
# ║  Read by: property_generator.py, select_generator.py                       ║
# ║  gen_parser receives a generated properties.gen derived from this file.    ║
# ╚══════════════════════════════════════════════════════════════════════════════╝
#
# ─── HOW TO ADD A NEW CSS PROPERTY ───
#
# 1. Add a [property_name] section below (use underscores, e.g. flex_grow)
# 2. Set the required fields (enum, inherited, parse, cascade, computed)
# 3. Run the build — the generator validates and tells you what's missing
# 4. If the generator cannot auto-generate opcodes, set opcodes_manual = true
#
# dispatch.c is auto-generated from this file — do NOT edit it manually.
#
# ─── FIELD REFERENCE ───
#
# Required:
#   enum           CSS_PROP_* enum name (e.g. "CSS_PROP_HEIGHT")
#   inherited      true if the property inherits by default (from CSS spec)
#                  REQUIRED for all properties with 'enum'. Missing = build error.
#   parse          Parse spec string for gen_parser
#                  (e.g. "IDENT:( INHERIT: INITIAL: ... IDENT:) LENGTH_UNIT:( ... )")
#   cascade        How the cascade .c file is handled. REQUIRED for all CSS_PROP_
#                  properties. Missing = build error. Possible values:
#                    "none"              No cascade file (shorthands, stubs, aliases)
#                    "manual"            Hand-written .c file in src/select/properties/
#                    <type string>       Auto-generated .c file using the named template:
#                      "ident"             IDENT-only switch (from parse spec opcodes)
#                      "bg_border_color"   → css__cascade_bg_border_color
#                      "border_style"      → css__cascade_border_style
#                      "border_width"      → css__cascade_border_width
#                      "length"            → css__cascade_length
#                      "length_auto"       → css__cascade_length_auto
#                      "length_auto_calc"  → css__cascade_length_auto_calc
#                      "length_normal"     → css__cascade_length_normal
#                      "length_none"       → css__cascade_length_none
#                      "number"            → css__cascade_number
#                      "uri_none"          → css__cascade_uri_none
#                      "page_break"        → css__cascade_page_break_after_before_inside
#                      "break"             → css__cascade_break_after_before_inside
#                      "counter"           → css__cascade_counter_increment_reset
#   computed       How the public API getter (css_computed_XXX) is handled.
#                  REQUIRED for all properties with 'bits'. Missing = build error.
#                  Possible values:
#                    "auto"    Simple wrapper: generated into autogenerated_computed.inc
#                              as  uint8_t css_computed_XXX(...) { return get_xxx(...); }
#                    "manual"  Custom logic: hand-written in computed_manual.c
#                    "none"    No public getter (shorthands, logical aliases, stubs)
#   initial        CSS spec initial value keyword (e.g. "AUTO", "NONE", "SEPARATE")
#                  Required when cascade is a type string.
#
# Optional — for computed style layout (select_generator.py):
#   bits           Bit width in computed style struct (e.g. 2)
#   values         Value type(s): "length", "color", "integer", "fixed", "string",
#                  "string_arr", "counter_arr", "content_item", "grid_track_arr",
#                  "transform_func_arr", "gradient"
#                  or nested arrays like [["length"], ["length"]]
#   condition      Condition enum for propget/propset (e.g. "CSS_HEIGHT_SET")
#   defaults       Default enum for propget/propset (e.g. "CSS_COLUMN_GAP_NORMAL")
#   outer_struct   true if property values are stored in the outer
#                  css_computed_style struct instead of _i (pointer-heavy types)
#   select_comments  Documentation comment for the property in computed.h
#   override       Override get/set generation: "get", "set", or ["get", "set"]
#
# Optional — extra data:
#   initial_data   Array of additional initial value arguments, as C expressions
#                  (e.g. ["0", "CSS_UNIT_PX"] or ["2"] or ["INTTOFIX(1)"])
#
# Flags (all default to false if omitted):
#   manual         Full manual parse implementation (no gen_parser output)
#   shorthand      Shorthand property (e.g. "border", "margin")
#   opcodes_manual Manual opcode enum definitions
#   wrap           WRAP function name, for properties that delegate parsing
#                  (e.g. "css__parse_border_side_color")
#
# ─── EXAMPLE: Adding a new IDENT property "text-wrap" ───
#
# [text_wrap]
# enum = "CSS_PROP_TEXT_WRAP"
# cascade = "ident"
# computed = "auto"
# inherited = true
# bits = 2                              # 2 bits = up to 4 values
# initial = "WRAP"                      # CSS spec: initial value is "wrap"
# parse = '''IDENT:( INHERIT: INITIAL: REVERT: UNSET: \
#   WRAP_STRING:0,TEXT_WRAP_WRAP NOWRAP:0,TEXT_WRAP_NOWRAP \
#   BALANCE:0,TEXT_WRAP_BALANCE IDENT:)'''
#

# ─── Generic templates (shared parse specs) ───

[generic.border_side_color]
enum = "op"
parse = "IDENT:( INHERIT: INITIAL: REVERT: UNSET: IDENT:) COLOR:BORDER_COLOR_SET"

[generic.border_side_style]
enum = "op"
parse = "IDENT:( INHERIT: INITIAL: REVERT: UNSET: NONE:0,BORDER_STYLE_NONE HIDDEN:0,BORDER_STYLE_HIDDEN DOTTED:0,BORDER_STYLE_DOTTED DASHED:0,BORDER_STYLE_DASHED SOLID:0,BORDER_STYLE_SOLID LIBCSS_DOUBLE:0,BORDER_STYLE_DOUBLE GROOVE:0,BORDER_STYLE_GROOVE RIDGE:0,BORDER_STYLE_RIDGE INSET:0,BORDER_STYLE_INSET OUTSET:0,BORDER_STYLE_OUTSET IDENT:)"

[generic.border_side_width]
enum = "op"
parse = "IDENT:( INHERIT: INITIAL: REVERT: UNSET: THIN:0,BORDER_WIDTH_THIN MEDIUM:0,BORDER_WIDTH_MEDIUM THICK:0,BORDER_WIDTH_THICK IDENT:) LENGTH_UNIT:( UNIT_PX:BORDER_WIDTH_SET MASK:UNIT_MASK_BORDER_SIDE_WIDTH RANGE:<0 LENGTH_UNIT:) CALC:( UNIT_PX:BORDER_WIDTH_CALC CALC:)"

[generic.margin_side]
enum = "op"
parse = "IDENT:( INHERIT: INITIAL: REVERT: UNSET: AUTO:0,MARGIN_AUTO IDENT:) LENGTH_UNIT:( UNIT_PX:MARGIN_SET MASK:UNIT_MASK_MARGIN_SIDE LENGTH_UNIT:) CALC:( UNIT_PX:MARGIN_CALC CALC:)"

[generic.padding_side]
enum = "op"
parse = "IDENT:( INHERIT: INITIAL: REVERT: UNSET: IDENT:) LENGTH_UNIT:( UNIT_PX:PADDING_SET MASK:UNIT_MASK_PADDING_SIDE RANGE:<0 LENGTH_UNIT:) CALC:( UNIT_PX:PADDING_CALC CALC:)"

[generic.side]
enum = "op"
parse = "IDENT:( INHERIT: INITIAL: REVERT: UNSET: AUTO:0,BOTTOM_AUTO IDENT:) LENGTH_UNIT:( UNIT_PX:BOTTOM_SET ALLOW:unit&(UNIT_LENGTH|UNIT_PCT) LENGTH_UNIT:) CALC:( UNIT_PX:BOTTOM_CALC CALC:)"

